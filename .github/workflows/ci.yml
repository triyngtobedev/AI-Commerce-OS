name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fix requirements encoding (if needed)
        run: python scripts/fix_requirements_encoding.py

      - name: Run test suite
        env:
          PIPELINE_API_KEY: test-key-ci
          YOUTUBE_AUTO_UPLOAD: "false"
          YOUTUBE_DRY_RUN: "true"
          USE_N8N_FOR_SCENES: "false"
        run: python run_tests.py fast

      - name: Validate providers (non-strict)
        run: python scripts/validate_providers.py
