[pytest]
testpaths = scripts tests
pythonpath = .
python_files = test_*.py
norecursedirs = .git __pycache__ node_modules
markers =
    integration: testes que exigem credenciais de API reais
# Script manual de conexão Gemini — não é teste automatizado
addopts = --ignore=scripts/ai/gemini/test_gemini.py
