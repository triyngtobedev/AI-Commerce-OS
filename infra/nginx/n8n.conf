# Nginx reverse proxy — n8n com HTTPS (Let's Encrypt)
#
# Antes de ativar SSL:
#   1. Substitua n8n.seudominio.com pelo seu domínio real
#   2. Obtenha certificado via Certbot (ver docs/n8n_integration.md)
#   3. Reinicie o container nginx: docker compose restart nginx

# Redireciona HTTP → HTTPS e serve desafio ACME do Certbot
server {
    listen 80;
    listen [::]:80;
    server_name n8n.seudominio.com;

    # Desafio Let's Encrypt (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Servidor HTTPS — proxy para n8n
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name n8n.seudominio.com;

    # Certificados Let's Encrypt (volume certbot_conf)
    ssl_certificate     /etc/letsencrypt/live/n8n.seudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.seudominio.com/privkey.pem;

    # Configurações SSL recomendadas
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Headers de segurança
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    # Limite de upload (vídeos/imagens em workflows)
    client_max_body_size 50m;

    # Proxy para o container n8n (rede interna Docker)
    location / {
        proxy_pass http://n8n:5678;
        proxy_http_version 1.1;

        # Headers necessários para WebSockets e webhooks n8n
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts estendidos para workflows de geração de vídeo (até 10 min)
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
}
